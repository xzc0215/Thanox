name: Build Thanox OSS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false # 💡 徹底切斷私有倉庫連結

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Prc Debug APK
        working-directory: android
        # 💡 使用 --no-daemon 預防守護進程崩潰，並分配 4G 內存
        run: ./gradlew :app:assemblePrcDebug --stacktrace --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: thanox-oss-apk
          path: android/app/build/outputs/apk/prc/debug/*.apk
