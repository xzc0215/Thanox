name: Build Thanox APK (OSS Version)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false # 徹底禁用子模組，防止報錯

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant gradlew permission
      working-directory: android
      run: chmod +x gradlew

    - name: Build Prc Debug APK
      working-directory: android
      # 使用 --continue 是為了在缺少私有類時，盡可能暴露出所有需要註釋掉的地方
      run: ./gradlew :app:assemblePrcDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: thanox-oss-apk
        path: |
          android/app/build/outputs/apk/prc/debug/*.apk
